<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Ram Electronics</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #1A1A1A;
            color: #D3D3D3;
            font-family: Arial, sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #2F2F2F;
            box-shadow: 0 4px 10px #B00000;
            position: relative;
        }
        .logo img {
            height: 80px;
        }
        .title {
            font-size: 2.5em;
            font-weight: bold;
            text-transform: uppercase;
            color: #B00000;
            position: relative;
            -webkit-text-stroke: 2px #B00000;
            transition: 0.3s ease-in-out;
        }
        .title:hover {
            color: #ff4d4d;
            text-shadow: 0 0 15px #ff4d4d, 0 0 30px #ff4d4d;
            -webkit-text-stroke: 2px #ff0000;
            transform: scale(1.05);
        }
        .title a {
            text-decoration: none;
            color: inherit;
        }
        .title span {
            cursor: pointer;
        }

        


        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            padding: 0;
        }
        nav a {
            text-decoration: none;
            color: #D3D3D3;
            font-size: 1.5em;
            position: relative;
            transition: color 0.3s, transform 0.3s ease-in-out;
        }
        nav a:hover {
            color: #B00000;
            transform: translateY(-5px);
        }
        nav a::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -5px;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, pink, sandybrown);
            transition: width 0.4s ease-in-out, left 0.4s ease-in-out;
        }
        nav a:hover::after {
            width: 100%;
            left: 0;
        }
        .content {
            text-align: center;
            margin-top: 50px;
            font-size: 1.8em;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Back Arrow with Neon Effect */
        .back-arrow {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 2em;
            color: #B00000;
            text-decoration: none;
            transition: 0.3s;
            z-index: 10;
        }
        .back-arrow:hover {
            color: #ff4d4d;
            text-shadow: 0 0 15px #ff4d4d, 0 0 30px #ff4d4d;
        }

        /* Slider Styles */
        .slider {
            position: relative;
            max-width: 100%;
            height: 500px;
            overflow: hidden;
            margin: 20px auto;
        }
        .slides {
            display: flex;
            width: 500%;
            transition: transform 0.5s ease-in-out;
        }
        .slides img {
            width: 20%;
            height: 500px;
            object-fit: cover;
        }

        /* Navigation Arrows */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            cursor: pointer;
            border: none;
            font-size: 2em;
            border-radius: 50%;
            transition: background 0.3s, transform 0.3s ease-in-out;
            z-index: 10;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        .prev:hover, .next:hover {
            background-color: rgba(176, 0, 0, 0.8);
            transform: scale(1.1);
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px;
        }
        .product {
            background: #2F2F2F;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 15px #B00000;
            transition: 0.3s;
        }
        .product:hover {
            box-shadow: 0 0 25px #e976d4;
            transform: scale(1.05);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2F2F2F;
            box-shadow: 0 -4px 10px #B00000;
            margin-top: 20px;
        }
        
    .brand-slider {
        width: 100%;
        overflow: hidden;
        padding: 30px 0;
        background: #1A1A1A;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
    }
    .brand-track {
        display: flex;
        gap: 30px;
        animation: slideBrands 10s linear infinite;
    }
    .brand-logo {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 10px #B00000;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .brand-logo img {
        width: 80%;
        height: 80%;
        object-fit: contain;
        border-radius: 50%;
    }
    .brand-logo:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #ff4d4d;
    }
    @keyframes slideBrands {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }
        
    </style>
</head>
<body>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let slideIndex = 0;
            const slides = document.querySelector(".slides");
            const totalSlides = document.querySelectorAll(".slides img").length;
            const prevButton = document.querySelector(".prev");
            const nextButton = document.querySelector(".next");

            function moveSlide(direction) {
                slideIndex += direction;
                if (slideIndex < 0) {
                    slideIndex = totalSlides - 1;
                } else if (slideIndex >= totalSlides) {
                    slideIndex = 0;
                }
                slides.style.transform = `translateX(-${slideIndex * 20}%)`;
            }

            // Add event listeners for navigation arrows
            prevButton.addEventListener("click", function () {
                moveSlide(-1);
            });
            nextButton.addEventListener("click", function () {
                moveSlide(1);
            });

            // Auto-slide every 5 seconds
            setInterval(() => moveSlide(1), 5000);
        });

        // Redirect "A" in "Shri Ram Electronics" to Admin Page
        function redirectToAdmin() {
            window.location.href = "admin_login.php";
        }
    </script>
